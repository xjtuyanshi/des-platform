id: random-breakdown
name: Random Breakdown Stress
description: Seeded stochastic line breakdowns with repair jitter, used to validate runtime stop/resume behavior and KPI degradation.
layoutPath: ../layouts/baseline-layout.json
durationSec: 28800
seed: 20260426
taktTimeSec: 40
snapshotIntervalSec: 1
motionDtSec: 0.1
line:
  stationCount: 10
  pacedCycleSec: 40
  pitchM: 5.1
  skidLengthM: 5
  skidGapM: 0.1
  carLengthM: 4.6
  carWidthM: 1.9
  carHeightM: 1.6
  conveyorSpeedMps: 0.1275
stations:
  qpc: [180, 200, 220, 190, 240, 210, 175, 230, 205, 250]
  initialBinFillRatio: 1
  unitsPerCar: 1
amr:
  count: 3
  speedMps: 1.5
  lengthM: 1.5
  widthM: 1.5
  heightM: 0.35
  loadTimeSec: 8
  unloadTimeSec: 8
  emptyHandlingSec: 6
breakdown:
  enabled: true
  mode: random
  mtbfSec: 2100
  repairSec: 180
  repairJitterRatio: 0.35
dispatch:
  policy: earliest-completion-nearest-idle
report:
  warmupSec: 400
  includeReplay: true
  includeStationTables: true
  liveWindowStartSec: 7190
  livePlaybackSpeed: 4
